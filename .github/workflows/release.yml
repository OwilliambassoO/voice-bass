name: Release

# Gera o instalador Windows autocontido do Voice Bass (variante CPU) e o publica
# como asset de um GitHub Release ao empurrar uma tag "v*".
#
# A variante GPU NÃO é construída no CI: o payload (torch CUDA) excede o limite
# do formato NSIS (makensis é 32 bits e falha com "failed creating mmap" acima
# de ~2 GiB) e também o limite de 2 GiB por asset do GitHub Release. O pacote
# GPU é gerado localmente como .7z portátil (npm run dist:gpu) e hospedado no
# Google Drive, com o link indicado nas notas do Release (ver README).
#
# O runner windows-latest já traz as VS C++ Build Tools necessárias para
# compilar fairseq.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # necessário para criar/atualizar o Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Construir runtime do backend (cpu)
        shell: pwsh
        run: ./build/build-backend-runtime.ps1 -Variant cpu -Clean

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm install

      - name: Empacotar instalador (cpu)
        working-directory: frontend
        shell: pwsh
        env:
          VB_VARIANT: cpu
        run: npm run dist:cpu

      - name: Publicar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: VoiceBass-cpu
          path: dist/installer/*.exe
          if-no-files-found: error

      # Anexa o instalador ao Release quando o disparo foi por tag.
      - name: Publicar no Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          fail_on_unmatched_files: true
